(function(){
  window.__rgSync=async function(){
    var btn=document.getElementById("rg-sync-btn");
    var status=document.getElementById("rg-sync-status");
    if(btn)btn.disabled=true;
    if(status)status.textContent="Syncing...";
    try{
      var cfg=JSON.parse(localStorage.getItem("rg_config:app")||"{}");
      var cycle=cfg.currentCycle||"2026-Q1";
      var url=cfg.backendUrl||"https://script.google.com/macros/s/AKfycbwe09lGRfA3FF66_mCPemeYuuLj1RrRwEGO-jUpRG4FdrQBbRkTKCZUYeqeMXv3UtCtRQ/exec";
      if(!url){if(status){status.textContent="No backend URL configured.";status.style.color="#b91c1c"}if(btn)btn.disabled=false;return}
      var r=await fetch(url+"?action=get_all_data&pin=4152&cycle="+encodeURIComponent(cycle));
      var d=await r.json();
      if(!d.success){if(status)status.textContent="Error: "+(d.error||"Unknown");if(btn)btn.disabled=false;return}
      var cnt=0;
      if(d.data.leaders)for(var i=0;i<d.data.leaders.length;i++){var l=d.data.leaders[i];localStorage.setItem("rg_leader:"+l.id+":profile",JSON.stringify(l));cnt++}
      if(d.data.observers)for(var i=0;i<d.data.observers.length;i++){var o=d.data.observers[i];localStorage.setItem("rg_observer:"+o.id+":profile",JSON.stringify(o));cnt++}
      if(d.data.s1)for(var i=0;i<d.data.s1.length;i++){var s=d.data.s1[i];localStorage.setItem("rg_leader:"+s.leaderId+":s1:"+s.cycle,JSON.stringify(s));cnt++}
      if(d.data.s2)for(var i=0;i<d.data.s2.length;i++){var s=d.data.s2[i];localStorage.setItem("rg_obs:"+s.leaderId+":"+s.cycle,JSON.stringify(s));cnt++}
      if(d.data.s3)for(var i=0;i<d.data.s3.length;i++){var s=d.data.s3[i];localStorage.setItem("rg_crew:"+s.leaderId+":"+s.cycle+":"+s.uuid,JSON.stringify(s));cnt++}
      if(d.data.reports)for(var i=0;i<d.data.reports.length;i++){var s=d.data.reports[i];localStorage.setItem("rg_report:"+s.leaderId+":"+s.cycle,JSON.stringify(s));cnt++}
      if(status){status.textContent="Synced "+cnt+" records (incl. observers). Refresh page to update dashboard.";status.style.color="#047857"}
    }catch(err){if(status){status.textContent="Failed: "+err.message;status.style.color="#b91c1c"}}
    if(btn)btn.disabled=false;
  };

  var observer=new MutationObserver(function(){
    var tabs=document.querySelectorAll('[role="tabpanel"]');
    for(var i=0;i<tabs.length;i++){
      var tab=tabs[i];
      if(tab.textContent.indexOf("Backup")>-1 && !document.getElementById("rg-sync-card")){
        var card=document.createElement("div");
        card.id="rg-sync-card";
        card.style.cssText="border:1px solid #a7f3d0;background:#ecfdf5;border-radius:12px;padding:16px;margin-bottom:16px;";
        card.innerHTML='<p style="font-weight:600;font-size:14px;margin:0 0 4px">Cloud Sync</p>'
          +'<p style="font-size:12px;color:#666;margin:0 0 12px">Pull all survey submissions from Google Sheets backend and sync observers from PMR.</p>'
          +'<button id="rg-sync-btn" onclick="window.__rgSync()" style="background:#047857;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px">Sync Now</button>'
          +'<p id="rg-sync-status" style="font-size:12px;margin:8px 0 0;color:#666"></p>';
        tab.insertBefore(card,tab.firstChild);
      }
    }
  });
  observer.observe(document.body||document.documentElement,{childList:true,subtree:true});
})();
